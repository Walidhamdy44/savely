<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savely</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <div class="logo-icon">
              <svg viewBox="0 0 24 24" width="26" height="26">
                <path
                  fill="currentColor"
                  d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"
                />
              </svg>
            </div>
            <div class="logo-text">
              <h1>Savely</h1>
              <span class="tagline">Export your saved content</span>
            </div>
          </div>
        </div>
      </header>

      <main class="main">
        <!-- Connection Settings -->
        <div id="connectionSection" class="card connection-card">
          <div class="card-header">
            <h2>
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
                />
              </svg>
              App Connection
            </h2>
            <button
              id="toggleConnectionBtn"
              class="btn btn-secondary btn-icon btn-toggle"
              title="Settings"
            >
              <svg viewBox="0 0 24 24" width="14" height="14">
                <path
                  fill="currentColor"
                  d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"
                />
              </svg>
            </button>
          </div>
          <div id="connectionBody" class="card-body connection-body hidden">
            <div class="input-group">
              <label class="input-label">API Token</label>
              <input
                type="password"
                id="apiToken"
                class="input"
                placeholder="Paste your token from Settings page"
              />
            </div>
            <button id="connectBtn" class="btn btn-primary" style="width: 100%">
              Connect
            </button>
          </div>
          <div id="connectedInfo" class="connected-bar hidden">
            <div class="connected-dot-row">
              <span class="dot-green"></span>
              <span id="connectedUser">Connected</span>
            </div>
            <button
              id="disconnectBtn"
              class="btn btn-secondary btn-icon"
              title="Disconnect"
              style="padding: 4px 8px; font-size: 11px; width: auto"
            >
              ✕
            </button>
          </div>
          <div
            id="connectionStatus"
            class="status hidden"
            style="margin: 0 14px 10px"
          >
            <div class="status-icon-wrapper">
              <span class="status-icon"></span>
            </div>
            <span class="status-text"></span>
          </div>
        </div>

        <!-- Platform Indicator -->
        <div id="platformBadge" class="platform-badge hidden">
          <span class="platform-icon"></span>
          <span class="platform-name"></span>
        </div>

        <!-- Status Message -->
        <div id="status" class="status hidden">
          <div class="status-icon-wrapper">
            <span class="status-icon"></span>
          </div>
          <span class="status-text"></span>
        </div>

        <!-- Action Card -->
        <div class="card action-card">
          <div class="card-body">
            <div class="supported-platforms">
              <div class="platform-item">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="#0A66C2"
                    d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"
                  />
                </svg>
                <span>LinkedIn Saved Posts</span>
              </div>
              <div class="platform-item">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path
                    fill="#FF0000"
                    d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
                  />
                </svg>
                <span>YouTube Playlists</span>
              </div>
            </div>

            <button id="scrapeBtn" class="btn btn-primary btn-large">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path
                  fill="currentColor"
                  d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
                />
              </svg>
              <span>Scrape Current Page</span>
            </button>

            <p class="help-text">
              Navigate to a supported page and click to scrape
            </p>
          </div>
        </div>

        <!-- Progress Card -->
        <div id="progress" class="card progress-card hidden">
          <div class="progress-content">
            <div class="progress-spinner">
              <svg class="spinner-svg" viewBox="0 0 50 50">
                <circle
                  class="spinner-path"
                  cx="25"
                  cy="25"
                  r="20"
                  fill="none"
                  stroke-width="4"
                ></circle>
              </svg>
            </div>
            <div class="progress-info">
              <span id="progressText" class="progress-text">Scraping...</span>
              <span id="progressCount" class="progress-count"
                >0 items found</span
              >
            </div>
          </div>
          <div class="progress-bar-container">
            <div id="progressFill" class="progress-bar-fill"></div>
          </div>
        </div>

        <!-- Results Card -->
        <div id="previewContainer" class="card results-card hidden">
          <div class="card-header results-header">
            <h2>
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path
                  fill="currentColor"
                  d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"
                />
              </svg>
              Results
              <span id="postCount" class="badge">0</span>
            </h2>
            <div class="export-controls">
              <div class="format-toggle">
                <label class="toggle-option">
                  <input type="radio" name="format" value="json" checked />
                  <span>JSON</span>
                </label>
                <label class="toggle-option">
                  <input type="radio" name="format" value="csv" />
                  <span>CSV</span>
                </label>
              </div>
            </div>
          </div>

          <div class="table-container">
            <table id="previewTable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>

          <div class="card-footer">
            <button
              id="scrapeAgainBtn"
              class="btn btn-secondary btn-icon"
              title="Scrape again"
            >
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"
                />
              </svg>
            </button>
            <button
              id="copyBtn"
              class="btn btn-secondary btn-icon"
              title="Copy to clipboard"
            >
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"
                />
              </svg>
            </button>
            <button id="syncBtn" class="btn btn-sync" title="Sync to your app">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M5 4v2h14V4H5zm0 10h4v6h6v-6h4l-7-7-7 7z"
                />
              </svg>
              <span>Sync</span>
            </button>
            <button id="downloadBtn" class="btn btn-primary">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"
                />
              </svg>
              <span>Download</span>
            </button>
          </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="48" height="48">
              <path
                fill="currentColor"
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
              />
            </svg>
          </div>
          <h3>Supported Pages</h3>
          <div class="supported-links">
            <a
              href="https://www.linkedin.com/my-items/saved-posts/"
              target="_blank"
            >
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2z"
                />
              </svg>
              LinkedIn Saved Posts
            </a>
            <a href="https://www.youtube.com/playlist?list=WL" target="_blank">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  fill="currentColor"
                  d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"
                />
              </svg>
              YouTube Watch Later
            </a>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="footer">
        <span>Savely v1.0</span>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
